name: PR Commit Checks

on:
  pull_request:

permissions:
  contents: read

jobs:
  pr-commit-checks:
    if: ${{ github.event.pull_request.user.login != 'renovate[bot]' && github.event.pull_request.user.login != 'github-actions[bot]' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check single commit
        env:
          COMMITS: ${{ github.event.pull_request.commits }}
        run: |
          if [ "$COMMITS" -ne 1 ]; then
            echo "Error: PR must contain exactly 1 commit, found $COMMITS."
            exit 1
          fi

      - name: Checkout PR
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: always()
        with:
          fetch-depth: 0

      - name: Check Signed-off-by
        if: always()
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          missing=$(git log "$BASE_SHA".."$HEAD_SHA" --format="%H %s" | while read sha msg; do
            if ! git log -1 --format="%B" "$sha" | grep -qiE "^Signed-off-by: .+ <.+>$"; then
              echo "  $sha $msg"
            fi
          done)
          if [ -n "$missing" ]; then
            echo "Error: the following commit(s) are missing a Signed-off-by trailer:"
            echo "$missing"
            exit 1
          fi
